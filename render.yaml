# Render.com — configuración del despliegue del dashboard de Peñíscola.
# Plan: Free. La app se duerme tras 15 min sin uso; primer click reactiva ~30 s.
#
# Dashboard PÚBLICO: cualquiera con la URL accede sin login.
# Si en el futuro quieres añadir contraseña, define DASH_USER y DASH_PASS en
# el panel "Environment" de Render — el código ya lo soporta automáticamente.
# Si quieres habilitar el chat/análisis con ChatGPT, añade OPENAI_API_KEY.
services:
  - type: web
    name: peniscola-dashboard
    runtime: node
    plan: free
    region: frankfurt        # latencia razonable desde España
    branch: main
    buildCommand: npm ci
    startCommand: node server.js
    healthCheckPath: /api/status
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURISMO_REFRESH_HORAS
        value: "504"        # 3 semanas; el INE publica datos mensuales, no hace falta más
